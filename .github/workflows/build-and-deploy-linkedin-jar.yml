name: Build and Deploy LinkedIn Jar

on:
  push:
    branches:
      - main
    paths:
      - 'fontes-estruturado/principal/**'
      - '.github/workflows/build-and-deploy-linkedin-jar.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      VPS_HOST: 187.45.254.75
      VPS_USER: ${{ secrets.VPS_USUARIO }}
      VPS_PASSWORD: ${{ secrets.VPS_SENHA }}
      VPS_PUBLIC_DIR: ${{ secrets.VPS_DIRETORIO_PUBLICO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar (obtemoportunidadelinkedin)
        working-directory: fontes-estruturado/principal
        run: mvn -B -pl obtemoportunidadelinkedin -am clean package -DskipTests

      - name: Resolve jar file
        id: jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH=$(ls -t fontes-estruturado/principal/obtemoportunidadelinkedin/target/*.jar \
            | grep -vE '(sources|javadoc|original)' \
            | head -n 1)

          if [ -z "${JAR_PATH:-}" ]; then
            echo "Nenhum .jar encontrado em target/." >&2
            exit 1
          fi

          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Jar selecionado: $JAR_PATH"

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload jar to public VPS directory
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VPS_USER:-}" ]; then
            echo "Defina o secret VPS_USUARIO (usuário SSH do servidor)." >&2
            exit 1
          fi

          if [ -z "${VPS_PASSWORD:-}" ]; then
            echo "Defina o secret VPS_SENHA (senha SSH do servidor)." >&2
            exit 1
          fi

          TARGET_DIR="${VPS_PUBLIC_DIR:-/var/www/html}"
          JAR_PATH='${{ steps.jar.outputs.jar_path }}'

          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$TARGET_DIR'"

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$JAR_PATH" \
            "$VPS_USER@$VPS_HOST:$TARGET_DIR/"

          echo "Deploy concluído para $VPS_USER@$VPS_HOST:$TARGET_DIR"

name: Build and Deploy LinkedIn Jar

on:
  push:
    branches:
      - main
    paths:
      - 'fontes-estruturado/principal/**'
      - '.github/workflows/build-and-deploy-linkedin-jar.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      VPS_HOST: 187.45.254.75
      VPS_PORT: ${{ secrets.VPS_PORTA }}
      VPS_USER: ${{ secrets.VPS_USUARIO }}
      VPS_PUBLIC_DIR: ${{ secrets.VPS_DIRETORIO_PUBLICO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar (obtemoportunidadelinkedin)
        working-directory: fontes-estruturado/principal
        run: mvn -B -pl obtemoportunidadelinkedin -am clean package -DskipTests

      - name: Resolve jar file
        id: jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH=$(ls -t fontes-estruturado/principal/obtemoportunidadelinkedin/target/*.jar \
            | grep -vE '(sources|javadoc|original)' \
            | head -n 1)

          if [ -z "${JAR_PATH:-}" ]; then
            echo "Nenhum .jar encontrado em target/." >&2
            exit 1
          fi

          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Jar selecionado: $JAR_PATH"

      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_CHAVE_PRIVADA_SSH }}

      - name: Add VPS to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload jar to public VPS directory
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VPS_USER:-}" ]; then
            echo "Defina o secret VPS_USUARIO (usuário SSH do servidor)." >&2
            exit 1
          fi

          if [ -z "${{ secrets.VPS_CHAVE_PRIVADA_SSH }}" ]; then
            echo "Defina o secret VPS_CHAVE_PRIVADA_SSH (chave privada SSH)." >&2
            exit 1
          fi

          TARGET_DIR="${VPS_PUBLIC_DIR:-/var/www/html}"
          SSH_PORT="${VPS_PORT:-22}"
          JAR_PATH='${{ steps.jar.outputs.jar_path }}'

          ssh -p "$SSH_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$TARGET_DIR'"

          scp -P "$SSH_PORT" "$JAR_PATH" "$VPS_USER@$VPS_HOST:$TARGET_DIR/"

          echo "Deploy concluído para $VPS_USER@$VPS_HOST:$TARGET_DIR"

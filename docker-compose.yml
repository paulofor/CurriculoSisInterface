version: '3.8'

services:
  backend:
    build:
      context: ./loopback-server
      dockerfile: Dockerfile
    container_name: curriculosis-backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./loopback-angular6
      dockerfile: Dockerfile
    container_name: curriculosis-frontend
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

version: '3.8'

services:
  backend:
    build:
      context: ./loopback-server
      dockerfile: Dockerfile
    container_name: curriculosis-backend
    expose:
      - "25012"
    restart: unless-stopped

  frontend:
    build:
      context: ./loopback-angular6
      dockerfile: Dockerfile
    container_name: curriculosis-frontend
    expose:
      - "4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server-java
      dockerfile: Dockerfile
    container_name: curriculosis-mcp-server
    expose:
      - "8090"
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: curriculosis-gateway
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - mcp-server
    restart: unless-stopped
